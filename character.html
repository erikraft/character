<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Details - Character Hub</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .character-detail {
            padding: 6rem 0 4rem;
        }
        
        .character-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .character-large {
            font-size: 8rem;
            margin-bottom: 1rem;
            background: var(--bg-tertiary);
            padding: 2rem;
            border-radius: var(--radius-xl);
            display: inline-block;
            box-shadow: var(--shadow-lg);
        }
        
        .character-title {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }
        
        .character-subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-family: monospace;
        }
        
        .character-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        
        .info-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--border-color);
            overflow-x: auto;
        }
        
        .tab-button {
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }
        
        .tab-button.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }
        
        .tab-button:hover {
            color: var(--primary-color);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeInUp 0.3s ease-out;
        }
        
        .info-table {
            width: 100%;
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }
        
        .info-table th,
        .info-table td {
            padding: 1rem 1.5rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        
        .info-table th {
            background: var(--bg-tertiary);
            font-weight: 600;
            color: var(--text-primary);
            width: 30%;
        }
        
        .info-table tr:last-child th,
        .info-table tr:last-child td {
            border-bottom: none;
        }
        
        .code-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        
        .code-card {
            background: white;
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }
        
        .code-card h4 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--primary-color);
        }
        
        .code-block {
            background: var(--bg-tertiary);
            padding: 1rem;
            border-radius: var(--radius-md);
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            word-break: break-all;
            position: relative;
            margin-bottom: 0.5rem;
        }
        
        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.75rem;
            transition: background 0.3s ease;
        }
        
        .copy-btn:hover {
            background: var(--primary-dark);
        }
        
        .encoding-table {
            width: 100%;
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            margin-top: 2rem;
        }
        
        .encoding-table th,
        .encoding-table td {
            padding: 0.75rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }
        
        .encoding-table th {
            background: var(--bg-tertiary);
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .encoding-table tr:last-child th,
        .encoding-table tr:last-child td {
            border-bottom: none;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary-color);
            text-decoration: none;
            margin-bottom: 2rem;
            transition: color 0.3s ease;
        }
        
        .back-link:hover {
            color: var(--primary-dark);
        }
        
        @media (max-width: 768px) {
            .character-large {
                font-size: 5rem;
            }
            
            .character-title {
                font-size: 2rem;
            }
            
            .info-tabs {
                justify-content: flex-start;
            }
            
            .tab-button {
                padding: 0.75rem 1rem;
                font-size: 0.9rem;
            }
            
            .info-table th,
            .info-table td {
                padding: 0.75rem 1rem;
            }
            
            .info-table th {
                width: 40%;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logo">
                    <h1>Character Hub</h1>
                </div>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="../index.html" class="nav-link">Início</a>
                    </li>
                    <li class="nav-item">
                        <a href="../index.html#characters" class="nav-link">Caracteres</a>
                    </li>
                    <li class="nav-item">
                        <a href="../index.html#contact" class="nav-link">Contato</a>
                    </li>
                </ul>
                <div class="nav-toggle" id="mobile-menu">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>
            </div>
        </nav>
    </header>

    <main class="character-detail">
        <div class="container">
            <a href="../index.html" class="back-link">
                <i class="fas fa-arrow-left"></i>
                Voltar para lista de caracteres
            </a>

            <div class="character-header">
                <div class="character-large" id="characterDisplay">｜</div>
                <h1 class="character-title" id="characterName">Vertical Line</h1>
                <p class="character-subtitle" id="characterUnicode">U+007C</p>
                
                <div class="character-actions">
                    <button class="btn btn-primary" onclick="copyCurrentCharacter()">
                        <i class="fas fa-copy"></i> Copiar Caractere
                    </button>
                    <button class="btn btn-outline" onclick="shareCurrentCharacter()">
                        <i class="fas fa-share-alt"></i> Compartilhar
                    </button>
                    <a href="https://whatsapp.com/channel/0029VbByq5459PwQ2uEGbn0B" target="_blank" class="btn btn-secondary">
                        <i class="fab fa-whatsapp"></i> WhatsApp
                    </a>
                </div>
            </div>

            <div class="info-tabs">
                <button class="tab-button active" onclick="switchTab('properties')">
                    <i class="fas fa-info-circle"></i> Propriedades
                </button>
                <button class="tab-button" onclick="switchTab('encoding')">
                    <i class="fas fa-code"></i> Codificação
                </button>
                <button class="tab-button" onclick="switchTab('codes')">
                    <i class="fas fa-keyboard"></i> Códigos para Copiar
                </button>
            </div>

            <div id="properties" class="tab-content active">
                <table class="info-table">
                    <tbody id="propertiesTable">
                        <!-- Propriedades serão inseridas aqui via JavaScript -->
                    </tbody>
                </table>
            </div>

            <div id="encoding" class="tab-content">
                <table class="encoding-table">
                    <thead>
                        <tr>
                            <th>Codificação</th>
                            <th>Hex</th>
                            <th>Dec (bytes)</th>
                            <th>Dec</th>
                            <th>Binary</th>
                        </tr>
                    </thead>
                    <tbody id="encodingTable">
                        <!-- Dados de codificação serão inseridos aqui via JavaScript -->
                    </tbody>
                </table>
            </div>

            <div id="codes" class="tab-content">
                <div class="code-grid" id="codesGrid">
                    <!-- Códigos para copiar serão inseridos aqui via JavaScript -->
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Character Hub. Todos os direitos reservados.</p>
            <p>Explorando o fascinante mundo dos caracteres Unicode</p>
        </div>
    </footer>

    <script src="script.js"></script>

                    'UTF-16BE': { hex: '11 60', decBytes: '17 96', dec: '4448', binary: '00010001 01100000' },
                    'UTF-16LE': { hex: '60 11', decBytes: '96 17', dec: '4481', binary: '01100000 00010001' },
                    'UTF-32BE': { hex: '00 01 16 60', decBytes: '0 1 22 96', dec: '70400', binary: '00000000 00000001 00010110 01100000' },

                    'UTF-16BE': { hex: '20 00', decBytes: '32 0', dec: '8192', binary: '00100000 00000000' },
                    'UTF-16LE': { hex: '00 20', decBytes: '0 32', dec: '8192', binary: '00000000 00100000' },
                    'UTF-32BE': { hex: '00 00 20 00', decBytes: '0 0 32 0', dec: '8192', binary: '00000000 00000000 00100000 00000000' },
                    'UTF-32LE': { hex: '00 20 00 00', decBytes: '0 32 0 0', dec: '2097152', binary: '00000000 00100000 00000000 00000000' }

                    'UTF-32BE': { hex: '00 00 20 5F', decBytes: '0 0 32 95', dec: '8287', binary: '00000000 00000000 00100000 01011111' },

                }

        let currentCharacter = null;

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const unicodeCode = urlParams.get('unicode');
            
            if (unicodeCode && charactersData[unicodeCode]) {
                loadCharacter(unicodeCode);
            } else {
                // Caracter padrão se nenhum for especificado
                loadCharacter('U+007C');
            }

            // Mobile menu toggle
            const mobileMenu = document.getElementById('mobile-menu');
            const navMenu = document.querySelector('.nav-menu');
            
            if (mobileMenu && navMenu) {
                mobileMenu.addEventListener('click', function() {
                    navMenu.classList.toggle('active');
                });
            }
        });

        function loadCharacter(unicodeCode) {
            currentCharacter = charactersData[unicodeCode];
            if (!currentCharacter) return;

            // Atualizar informações básicas
            document.getElementById('characterDisplay').textContent = currentCharacter.character;
            document.getElementById('characterName').textContent = currentCharacter.name;
            document.getElementById('characterUnicode').textContent = currentCharacter.unicode;

            // Carregar propriedades
            loadProperties();
            
            // Carregar codificação
            loadEncoding();
            
            // Carregar códigos
            loadCodes();
        }

        function loadProperties() {
            const tbody = document.getElementById('propertiesTable');
            tbody.innerHTML = '';
            
            for (const [key, value] of Object.entries(currentCharacter.properties)) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <th>${key}</th>
                    <td>${value}</td>
                `;
                tbody.appendChild(row);
            }
        }

        function loadEncoding() {
            const tbody = document.getElementById('encodingTable');
            tbody.innerHTML = '';
            
            for (const [encoding, data] of Object.entries(currentCharacter.encoding)) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${encoding}</td>
                    <td>${data.hex}</td>
                    <td>${data.decBytes}</td>
                    <td>${data.dec}</td>
                    <td>${data.binary}</td>
                `;
                tbody.appendChild(row);
            }
        }

        function loadCodes() {
            const grid = document.getElementById('codesGrid');
            grid.innerHTML = '';
            
            for (const [language, code] of Object.entries(currentCharacter.codes)) {
                const card = document.createElement('div');
                card.className = 'code-card';
                card.innerHTML = `
                    <h4>${language}</h4>
                    <div class="code-block">
                        ${code}
                        <button class="copy-btn" onclick="copyText('${code}')">Copiar</button>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function switchTab(tabName) {
            // Remover classe active de todas as abas e conteúdos
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            // Adicionar classe active à aba e conteúdo selecionados
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        function copyCurrentCharacter() {
            if (currentCharacter) {
                copyCharacter(currentCharacter.character);
            }
        }

        function shareCurrentCharacter() {
            if (currentCharacter) {
                shareCharacter(currentCharacter.character, currentCharacter.unicode);
            }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(function() {
                showToast('Código copiado com sucesso!', 'success');
            }).catch(function(err) {
                showToast('Erro ao copiar código', 'error');
            });
        }

        function copyCharacter(character, event) {
            if (event) event.stopPropagation();
            navigator.clipboard.writeText(character).then(function() {
                showToast('Caractere copiado com sucesso!', 'success');
            }).catch(function(err) {
                showToast('Erro ao copiar caractere', 'error');
            });
        }

        function shareCharacter(character, unicodeCode) {
            const shareData = {
                title: `Character Hub - ${unicodeCode}`,
                text: `Confira este caractere especial: ${character}`,
                url: window.location.href
            };

            if (navigator.share) {
                navigator.share(shareData);
            } else {
                navigator.clipboard.writeText(window.location.href);
                showToast('Link copiado para compartilhar!', 'success');
            }
        }

        function showToast(message, type = 'success') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 2rem;
                right: 2rem;
                background: ${type === 'success' ? '#10b981' : '#ef4444'};
                color: white;
                padding: 1rem 1.5rem;
                border-radius: 0.5rem;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
                z-index: 1001;
                transform: translateX(400px);
                transition: transform 0.3s ease;
            `;
            document.body.appendChild(toast);

            setTimeout(() => toast.style.transform = 'translateX(0)', 100);
            setTimeout(() => {
                toast.style.transform = 'translateX(400px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
