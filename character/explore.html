            flex: 1;

            border: 2px solid var(--border-color);

            font-size: 1rem;
            transition: all 0.3s ease;
            background: var(--bg-primary);
            color: var(--text-primary);

        .search-input::placeholder {
            color: var(--text-secondary);
        }
        
        .search-input:focus {

            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);

        .search-btn {
            padding: 0.75rem 1.5rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .search-btn:hover {

        }
        
        .filter-group {
            width: 100%;
            margin-bottom: 1.5rem;

            font-weight: 600;
            margin-bottom: 1rem;

    <script>
        // Theme Manager local para explore.html
        class ThemeManager {
            constructor() {
                this.theme = this.loadTheme();
                this.init();
            }

            init() {
                this.addThemeToggle();
                this.applyTheme();
                this.setupSystemPreferenceListener();
            }

            loadTheme() {
                const stored = localStorage.getItem('theme');
                if (stored) {
                    return stored;
                }
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }

            saveTheme(theme) {
                localStorage.setItem('theme', theme);
                this.theme = theme;
                this.applyTheme();
            }

            applyTheme() {
                document.documentElement.setAttribute('data-theme', this.theme);
                this.updateThemeToggle();
            }

            toggleTheme() {
                const newTheme = this.theme === 'light' ? 'dark' : 'light';
                this.saveTheme(newTheme);
                showToast(`Tema ${newTheme === 'dark' ? 'escuro' : 'claro'} ativado`, 'success');
            }

            addThemeToggle() {
                const navContainer = document.querySelector('.nav-container');
                if (!navContainer || document.getElementById('theme-toggle')) return;
                const themeToggle = document.createElement('button');
                themeToggle.id = 'theme-toggle';
                themeToggle.className = 'theme-toggle';
                themeToggle.onclick = () => this.toggleTheme();
                navContainer.appendChild(themeToggle);
            }

            updateThemeToggle() {
                const toggle = document.getElementById('theme-toggle');
                if (toggle) {
                    toggle.innerHTML = this.theme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
                }
            }

            setupSystemPreferenceListener() {
                const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
                mediaQuery.addListener((e) => {
                    if (!localStorage.getItem('theme')) {
                        this.saveTheme(e.matches ? 'dark' : 'light');
                    }
                });
            }
        }

            },
            {
                char: 'ธิิิิิิิิิิิิิิิิิิิิิิิิ์์์์์์์์์์์์์์์์์์์์์์',
                name: 'Super Stack Character',
                code: 'Stacked',
                category: 'Combinação',
                description: 'Combinação impressionante de caracteres empilhados.',
                page: 'Super-Stack-Character.html',
            },
            {
                char: 'Z\u0311\u033E\u034B\u0313',
                name: 'Glitch Z',
                code: 'Glitch',
                category: 'Combinação',
                description: 'Letra Z com efeito glitch usando combining marks.',
                page: 'Glitch-Z.html',
            },
            {
                char: '🫪',
                name: 'Distorted Face',
                code: 'U+1FAEA',
                category: 'Emoji',
                description: 'Emoji de rosto distorcido (lançado em 2025).',
                page: 'U+1FAEA.html',
            },
        ];

        let currentPage = 1;
        const itemsPerPage = 12;
        let filteredCharacters = [...exploreCharacters];
        let currentSearch = '';
        let currentCategory = 'all';

        // Funções de áudio
        function playSuccessSound() {
            const audio = document.getElementById('successSound');
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log('Audio play failed:', e));
            }
        }
        
        function playErrorSound() {
            const audio = document.getElementById('errorSound');
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log('Audio play failed:', e));
            }
        }
        
        function playSharingSound() {
            const audio = document.getElementById('sharingSound');
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log('Audio play failed:', e));
            }
        }

        window.addEventListener('storage', function(e) {
            if (e.key === 'characterFavorites') {
                filteredCharacters = [...exploreCharacters];
                renderCharacters();
                updateFavoriteButtons();
            }
        });

        // Sistema de Favoritos
        function loadFavorites() {
            const f = localStorage.getItem('characterFavorites');
            if (!f) return [];
            try {
                let parsed = JSON.parse(f);
                let updated = false;
                parsed = parsed.map(item => {
                    if (item.character && !item.char) {
                        updated = true;
                        return {
                            char: item.character,
                            name: item.name || '',
                            code: item.unicode || item.code || '',
                            page: item.unicode || item.page || item.code || ''
                        };
                    }
                    return item;
                });
                if (updated) localStorage.setItem('characterFavorites', JSON.stringify(parsed));
                return parsed;
            } catch (e) {
                return [];
            }
        }

        function toggleFavorite(char, name, code, page, event) {
            if (event) event.stopPropagation();

            let favorites = loadFavorites();
            const exists = favorites.find(f => f.char === char);

            if (exists) {
                favorites = favorites.filter(f => f.char !== char);
                localStorage.setItem('characterFavorites', JSON.stringify(favorites));
                updateFavoriteButtons();
            } else {
                favorites.push({
                    char: char,
                    name: name,
                    code: code,
                    page: page || code
                });
                localStorage.setItem('characterFavorites', JSON.stringify(favorites));

                const sound = document.getElementById("favoriteSound");
                if (sound) {
                    sound.currentTime = 0;
                    sound.play().catch(e => console.log('Audio play failed:', e));
                }
                updateFavoriteButtons();
            }
        }

        function updateFavoriteButtons() {
            const favorites = loadFavorites();

            document.querySelectorAll(".btn-favorite").forEach(btn => {
                const char = btn.dataset.char;
                const isFav = favorites.find(f => f.char === char);

                if (isFav) {
                    btn.innerHTML = '<i class="fas fa-heart"></i>';
                    btn.classList.add('favorited');
                } else {
                    btn.innerHTML = '<i class="far fa-heart"></i>';
                    btn.classList.remove('favorited');
                }
            });
        }

        function renderCharacters() {
            const grid = document.getElementById('characterGrid');
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageCharacters = filteredCharacters.slice(startIndex, endIndex);

            if (pageCharacters.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 3rem;">
                        <i class="fas fa-search" style="font-size: 3rem; color: var(--text-secondary); margin-bottom: 1rem;"></i>
                        <h3 style="color: var(--text-secondary); margin-bottom: 0.5rem;">Nenhum caractere encontrado</h3>
                        <p style="color: var(--text-secondary);">Tente ajustar sua pesquisa.</p>
                    </div>
                `;
                document.getElementById('pagination').innerHTML = '';
                updateResultsInfo(0);
                return;
            }

            grid.innerHTML = pageCharacters.map(character => `
                <div class="character-list-item" onclick="navigateToCharacter('${character.page}')">
                    <div class="character-list-display">${character.char}</div>
                    <div class="character-list-info">
                        <h3>${character.name}</h3>
                        <p>${character.code}</p>
                        <p style="color: var(--primary-color); font-size: 0.8rem;">${character.category}</p>
                    </div>
                    <div class="character-list-description">${character.description}</div>
                    <div class="character-list-actions">
                        <button class="btn btn-sm btn-primary" onclick="copyCharacter('${character.char}', event)">
                            <i class="fas fa-copy"></i> Copiar
                        </button>
                        <button class="btn btn-sm btn-secondary" onclick="shareCharacter('${character.char}', '${character.code}', event)">
                            <i class="fas fa-share-alt"></i> Compartilhar
                        </button>
                        <button class="btn btn-sm btn-favorite" data-char="${character.char}" onclick="toggleFavorite('${character.char}','${character.name}','${character.code}','${character.page}',event)">
                            <i class="fas fa-heart"></i>
                        </button>
                    </div>
                </div>
            `).join('');

            renderPagination();
            updateResultsInfo(filteredCharacters.length);
        }

        function renderPagination() {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(filteredCharacters.length / itemsPerPage);
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let paginationHTML = '';
            
            // Previous button
            paginationHTML += `
                <button class="pagination-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                    <i class="fas fa-chevron-left"></i>
                </button>
            `;
            
            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                paginationHTML += `
                    <button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">
                        ${i}
                    </button>
                `;
            }
            
            // Next button
            paginationHTML += `
                <button class="pagination-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                    <i class="fas fa-chevron-right"></i>
                </button>
            `;
            
            pagination.innerHTML = paginationHTML;
        }

        function changePage(page) {
            const totalPages = Math.ceil(filteredCharacters.length / itemsPerPage);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderCharacters();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function performSearch() {
            const searchInput = document.getElementById('searchInput');
            currentSearch = searchInput.value.toLowerCase().trim();
            applyFilters();
        }

        function filterByCategory(category) {
            currentCategory = category;
            currentPage = 1;
            
            // Update active button
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Find the button that was clicked
            const clickedBtn = document.querySelector(`.category-btn[onclick*="'${category}'"]`);
            if (clickedBtn) {
                clickedBtn.classList.add('active');
            }
            
            applyFilters();
        }

        function applyFilters() {
            filteredCharacters = exploreCharacters.filter(character => {
                const matchesSearch = currentSearch === '' || 
                    character.name.toLowerCase().includes(currentSearch) ||
                    character.code.toLowerCase().includes(currentSearch) ||
                    character.description.toLowerCase().includes(currentSearch) ||
                    character.char.includes(currentSearch);
                
                const matchesCategory = currentCategory === 'all' || character.category === currentCategory;
                
                return matchesSearch && matchesCategory;
            });
            
            currentPage = 1;
            renderCharacters();
        }

        function updateResultsInfo(total) {
            const resultsInfo = document.getElementById('resultsInfo');
            let categoryText = currentCategory === 'all' ? '' : `categoria "${currentCategory}"`;
            let searchText = currentSearch ? `pesquisa "${currentSearch}"` : '';
            
            if (categoryText && searchText) {
                resultsInfo.innerHTML = `Encontrados ${total} caracteres para ${categoryText} e ${searchText}`;
            } else if (categoryText) {
                resultsInfo.innerHTML = `Encontrados ${total} caracteres para ${categoryText}`;
            } else if (searchText) {
                resultsInfo.innerHTML = `Encontrados ${total} caracteres para ${searchText}`;
            } else {
                resultsInfo.innerHTML = `Mostrando ${total} caracteres no total`;
            }
        }

        function navigateToCharacter(page) {
            if (page && page !== '#') {
                window.location.href = page;
            }
        }

        function copyCharacter(character, event) {
            if (event) event.stopPropagation();
            navigator.clipboard.writeText(character).then(() => {
                playSuccessSound();
                showToast('Caractere copiado com sucesso!', 'success');
            }).catch(() => {
                playErrorSound();
                showToast('Erro ao copiar caractere', 'error');
            });
        }
        
        function shareCharacter(character, code, event) {
            if (event) event.stopPropagation();
            playSharingSound();
            const shareData = {
                title: `Character Hub - ${code}`,
                text: `Confira este caractere especial: ${character}`,
                url: window.location.href
            };

            if (navigator.share) {
                navigator.share(shareData);
            } else {
                navigator.clipboard.writeText(window.location.href);
                showToast('Link copiado para compartilhar!', 'success');
            }
        }

        function showToast(message, type = 'success') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 2rem;
                right: 2rem;
                background: ${type === 'success' ? '#10b981' : '#ef4444'};
                color: white;
                padding: 1rem 1.5rem;
                border-radius: 0.5rem;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
                z-index: 1001;
                transform: translateX(400px);
                transition: transform 0.3s ease;
            `;
            document.body.appendChild(toast);

            setTimeout(() => toast.style.transform = 'translateX(0)', 100);
            setTimeout(() => {
                toast.style.transform = 'translateX(400px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Inicializar ThemeManager
            const themeManager = new ThemeManager();
            
            // Resetar filtros para garantir que comece com 'all'
            currentCategory = 'all';
            currentSearch = '';
            filteredCharacters = [...exploreCharacters];
            
            // Debug: Verificar se o array está correto
            console.log('Total de caracteres:', exploreCharacters.length);
            console.log('Filtros iniciais:', { currentCategory, currentSearch, filteredCharactersLength: filteredCharacters.length });
            
            renderCharacters();
            updateFavoriteButtons();
            
            // Add search on Enter key
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
        });
    </script>

    </audio>

    </audio>
    <audio id="sharingSound" preload="auto">

    </audio>
