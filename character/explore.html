        .character-list-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        
        .list-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .search-section {
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        
        .search-container {
            display: flex;
            gap: 0.5rem;
            max-width: 500px;
            width: 100%;
        }
        
        .search-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 1rem;
            transition: all 0.3s ease;
            color: #000000 !important;
            background-color: #ffffff !important;
        }
        
        .search-input::placeholder {
            color: #6b7280 !important;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .search-btn {
            padding: 0.75rem 1.5rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .search-btn:hover {
            background: var(--primary-dark);
        }
        
        .category-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            max-width: 800px;
            width: 100%;
        }
        
        .category-btn {
            padding: 0.5rem 1rem;
            border: 2px solid var(--border-color);
            background: white;
            color: var(--text-primary);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        
        .category-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        
        .category-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        
        .results-info {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        
        .list-header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        
        .list-header p {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }
        
        .character-list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .character-list-item {
            background: white;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .character-list-item:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary-color);
        }
        
        .character-list-display {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            min-height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            padding: 1rem;
            line-height: 0.8;
            overflow: hidden;
        }
        
        .character-list-info h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        
        .character-list-info p {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-family: monospace;
            font-size: 0.9rem;
        }
        
        .character-list-description {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.4;
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            color: white;
            border: none;
        }
        
        .btn-secondary:hover {
            background: linear-gradient(135deg, #4b5563, #374151);
            transform: translateY(-2px);
        }
        
        .character-list-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 3rem;
        }
        
        .pagination-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            background: white;
            color: var(--text-primary);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .pagination-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        
        .pagination-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

            background: var(--primary-dark);
            transform: translateY(-2px);

                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1rem;
            }

                position: static;
                margin-bottom: 2rem;
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

        // Funções de áudio
        function playSuccessSound() {
            const audio = document.getElementById('successSound');
            if (audio) {

                audio.play().catch(e => console.log('Audio play failed:', e));
            }
        }
        
        function playErrorSound() {
            const audio = document.getElementById('errorSound');
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log('Audio play failed:', e));
            }
        }

            }
        }

                    <div style="grid-column: 1 / -1; text-align: center; padding: 3rem;">
                        <i class="fas fa-search" style="font-size: 3rem; color: var(--text-secondary); margin-bottom: 1rem;"></i>
                        <h3 style="color: var(--text-secondary); margin-bottom: 0.5rem;">Nenhum caractere encontrado</h3>
                        <p style="color: var(--text-secondary);">Tente ajustar sua pesquisa ou categoria.</p>
                    </div>
                `;
                document.getElementById('pagination').innerHTML = '';
                updateResultsInfo(0);
                return;
            }

            grid.innerHTML = pageCharacters.map(character => `
                <div class="character-list-item" onclick="navigateToCharacter('${character.page}')">
                    <div class="character-list-display ${character.code === 'Stacked' || character.code === 'Glitch' ? 'super-stack-display' : ''}">${character.char}</div>
                    <div class="character-list-info">
                        <h3>${character.name}</h3>
                        <p>${character.code}</p>
                        <p style="color: var(--primary-color); font-size: 0.8rem;">${character.category}</p>
                    </div>
                    <div class="character-list-description">${character.description}</div>
                    <div class="character-list-actions">
                        <button class="btn btn-sm btn-primary" onclick="copyCharacter('${character.char}', event)">
                            <i class="fas fa-copy"></i> Copiar
                        </button>
                        <button class="btn btn-sm btn-secondary" onclick="shareCharacter('${character.char}', '${character.code}', event)">
                            <i class="fas fa-share-alt"></i> Compartilhar
                        </button>
                    </div>
                </div>
            `).join('');

            renderPagination();
            updateResultsInfo(filteredCharacters.length);
        }

        function renderPagination() {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(filteredCharacters.length / itemsPerPage);
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let paginationHTML = '';
            
            // Previous button
            paginationHTML += `
                <button class="pagination-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                    <i class="fas fa-chevron-left"></i>
                </button>
            `;
            
            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                paginationHTML += `
                    <button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">
                        ${i}
                    </button>
                `;
            }
            
            // Next button
            paginationHTML += `
                <button class="pagination-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                    <i class="fas fa-chevron-right"></i>
                </button>
            `;
            
            pagination.innerHTML = paginationHTML;
        }

        function changePage(page) {
            const totalPages = Math.ceil(filteredCharacters.length / itemsPerPage);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderCharacters();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function performSearch() {
            const searchInput = document.getElementById('searchInput');
            currentSearch = searchInput.value.toLowerCase().trim();
            applyFilters();
        }

        function filterByCategory(category) {
            currentCategory = category;
            
            // Update active button
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            applyFilters();
        }

        function applyFilters() {
            filteredCharacters = allCharacters.filter(character => {
                const matchesCategory = currentCategory === 'all' || character.category === currentCategory;
                const matchesSearch = currentSearch === '' || 
                    character.name.toLowerCase().includes(currentSearch) ||
                    character.code.toLowerCase().includes(currentSearch) ||
                    character.description.toLowerCase().includes(currentSearch) ||
                    character.char.includes(currentSearch);
                
                return matchesCategory && matchesSearch;
            });
            
            currentPage = 1;
            renderCharacters();
        }

        function updateResultsInfo(total) {
            const resultsInfo = document.getElementById('resultsInfo');
            if (currentSearch || currentCategory !== 'all') {
                const categoryText = currentCategory !== 'all' ? `categoria "${currentCategory}"` : '';
                const searchText = currentSearch ? `pesquisa "${currentSearch}"` : '';
                const separator = (categoryText && searchText) ? ' e ' : '';
                
                resultsInfo.innerHTML = `Encontrados ${total} caracteres para ${categoryText}${separator}${searchText}`;
            } else {
                resultsInfo.innerHTML = `Mostrando ${total} caracteres no total`;
            }
        }

        function navigateToCharacter(page) {
            if (page && page !== '#') {
                window.location.href = page;
            }
        }

        function copyCharacter(character, event) {
            if (event) event.stopPropagation();
            navigator.clipboard.writeText(character).then(() => {
                playSuccessSound();
                showToast('Caractere copiado com sucesso!', 'success');
            }).catch(() => {
                playErrorSound();
                showToast('Erro ao copiar caractere', 'error');
            });
        }
        
        function shareCharacter(character, code, event) {
            if (event) event.stopPropagation();
            playSharingSound();
            const shareData = {
                title: `Character Hub - ${code}`,
                text: `Confira este caractere especial: ${character}`,
                url: window.location.href
            };

            if (navigator.share) {
                navigator.share(shareData);
            } else {
                navigator.clipboard.writeText(window.location.href);
                showToast('Link copiado para compartilhar!', 'success');
            }
        }

        function showToast(message, type = 'success') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 2rem;
                right: 2rem;
                background: ${type === 'success' ? '#10b981' : '#ef4444'};
                color: white;
                padding: 1rem 1.5rem;
                border-radius: 0.5rem;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
                z-index: 1001;
                transform: translateX(400px);
                transition: transform 0.3s ease;
            `;
            document.body.appendChild(toast);

            setTimeout(() => toast.style.transform = 'translateX(0)', 100);
            setTimeout(() => {
                toast.style.transform = 'translateX(400px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderCharacters();
            
            // Add search on Enter key
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
            
        });
    </script>
    <audio id="successSound" preload="auto">
        <source src="../media/success.mp3" type="audio/mpeg">
    </audio>
    <audio id="errorSound" preload="auto">
        <source src="../media/error.mp3" type="audio/mpeg">
    </audio>
    <audio id="sharingSound" preload="auto">
        <source src="../media/sharing.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
