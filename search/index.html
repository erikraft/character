    <style>
        .search-page {
            padding: 8rem 1rem 4rem;
            background: var(--bg-secondary);
            min-height: 100vh;
        }

        .search-header {
            max-width: 900px;
            margin: 0 auto 2rem;
        }

        .search-header h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
        }

        .search-header p {
            color: var(--text-secondary);
        }

        .search-box {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .search-box input {
            flex: 1;
            min-width: 220px;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 1rem;
        }

        .search-results {
            max-width: 1200px;
            margin: 0 auto;
        }

        .character-list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.25rem;
        }

        .character-list-item {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
        }

        .character-list-item:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-color);
        }

        .character-list-display {
            font-size: 2.25rem;
            margin-bottom: 0.75rem;
            min-height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            padding: 0.75rem;
            line-height: 1;
            overflow: hidden;
            word-break: break-all;
            overflow-wrap: break-word;
            hyphens: auto;
        }

        .character-list-info h3 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .character-list-info p {
            color: var(--text-secondary);
            font-family: monospace;
            font-size: 0.85rem;
        }

        .no-results {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 2rem;
            text-align: center;
            color: var(--text-secondary);
        }
    </style>
</head>

    <main class="search-page">

                <button class="btn btn-primary" onclick="performSearch()">
                    <i class="fas fa-search"></i> Buscar

        </div>

        <div class="search-results" id="searchResults"></div>
    </main>

        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name) || '';
        }

        function renderResults(term) {
            const resultsEl = document.getElementById('searchResults');
            const subtitle = document.getElementById('searchSubtitle');

            if (!term) {
                subtitle.textContent = 'Digite um termo para pesquisar.';
                resultsEl.innerHTML = '<div class="no-results">Nenhum termo informado.</div>';
                return;
            }

            document.getElementById('searchInput').value = term;
            subtitle.textContent = `Resultados para "${term}"`;

            const normalized = term.toLowerCase().trim();
            const results = characters.filter(char =>
                char.name.toLowerCase().includes(normalized) ||
                char.code.toLowerCase().includes(normalized) ||
                char.char.includes(normalized)
            );

            if (!results.length) {
                resultsEl.innerHTML = '<div class="no-results">Nenhum caractere encontrado.</div>';
                return;
            }

            resultsEl.innerHTML = `
                <div class="character-list-grid">
                    ${results.map(character => `
                        <div class="character-list-item" onclick="window.location.href='${character.page}'">
                            <div class="character-list-display">${character.char}</div>
                            <div class="character-list-info">
                                <h3>${character.name}</h3>
                                <p>${character.code}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function performSearch() {
            const searchInput = document.getElementById('searchInput');
            const term = searchInput.value.trim();
            
            if (term) {
                window.location.href = `./?q=${encodeURIComponent(term)}`;
            } else {
                showToast('Digite um termo para pesquisar', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderResults(getQueryParam('q'));
            
            // Add search on Enter key
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
        });
